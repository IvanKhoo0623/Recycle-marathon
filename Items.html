<!DOCTYPE html>
<html lang="en">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="subDonation.css" rel="stylesheet" type="text/css">

<body>
  <ul class="navbar-sub">
    <li><a href="index.html">Home</a></li>
      <li><a href="Money.html">Money</a></li>
      <li><a href="Items.html" class="active">Items</a></li>
    </ul>

  <div class="container">
    <h1>Donation</h1>

     <div class="edit-row">
        <label>Name:</label>
        <input type="text" id="userName" placeholder="Enter your name" />
    </div>
    <div class="edit-row">
        <label>Email:</label>
        <input type="email" id="userEmail" placeholder="Enter your email" />
    </div>
    <div class="edit-row">
        <label>Item:</label>
        <input type="text" id="donationItem" placeholder="Enter the item donated" />
    </div>
    <div class="edit-row">
        <label>Amount:</label>
        <input type="number" id="donationAmount" placeholder="Enter amount of items donated" step="1" min="1" />
    </div>
    <button type="submit">Submit</button>
  </div>
